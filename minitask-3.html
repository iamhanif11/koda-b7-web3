<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="minitask-3.css">
</head>
<body>
    
    <div class="display">
        <h1>0</h1>
    </div>
    <div class="buttons">
        <div class="left-button">
        <button class="item">Deg | Rad</button>
        <button class="item1">x!</button>
        <button class="item1">Inv</button>
        <button class="item1">sin</button>
        <button class="item1">ln</button>
        <button class="item1">π</button>
        <button class="item1">cos</button>
        <button class="item1">log</button>
        <button class="item1">e</button>
        <button class="item1">tan</button>
        <button class="item1">√</button>
        <button class="item1">Ans</button>
        <button class="item1">EXP</button>
        <button class="item1">x^y</button>
      
    </div>
    <div class="right-button">
        <button class="item2">(</button>
        <button class="item2">)</button>
        <button class="item2">%</button>
        <button class="item2">AC</button>
        <button class="item2">7</button>
        <button class="item2">8</button>
        <button class="item2">9</button>
        <button class="item2">÷</button>
        <button class="item2">4</button>
        <button class="item2">5</button>
        <button class="item2">6</button>
        <button class="item2">x</button>
        <button class="item2">1</button>
        <button class="item2">2</button>
        <button class="item2">3</button>
        <button class="item2">-</button>
        <button class="item2">0</button>
        <button class="item2">.</button>
        <button class="item2">=</button>
        <button class="item2">+</button>
    </div>
    
</body>
</html>
